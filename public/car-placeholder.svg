<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="600" fill="#1a1a1a"/>

  <!-- Car Body - Sleek Sports Car -->
  <g id="car" transform="translate(200, 200)">
    <!-- Main Body -->
    <path d="M 100 150 L 150 120 L 300 100 L 500 100 L 650 120 L 700 150 L 700 200 L 100 200 Z"
          fill="url(#carGradient)" stroke="#c0c0c0" stroke-width="3"/>

    <!-- Windshield -->
    <path d="M 300 100 L 350 80 L 500 80 L 550 100 Z"
          fill="#2a2a2a" stroke="#808080" stroke-width="2" opacity="0.8"/>

    <!-- Side Window -->
    <path d="M 200 120 L 280 110 L 280 150 L 200 150 Z"
          fill="#2a2a2a" stroke="#808080" stroke-width="2" opacity="0.8"/>

    <!-- Wheels -->
    <circle cx="250" cy="200" r="40" fill="#1a1a1a" stroke="#c0c0c0" stroke-width="4"/>
    <circle cx="250" cy="200" r="25" fill="#3a3a3a" stroke="#808080" stroke-width="2"/>
    <circle cx="550" cy="200" r="40" fill="#1a1a1a" stroke="#c0c0c0" stroke-width="4"/>
    <circle cx="550" cy="200" r="25" fill="#3a3a3a" stroke="#808080" stroke-width="2"/>

    <!-- Headlight -->
    <ellipse cx="680" cy="135" rx="15" ry="10" fill="#ffff00" opacity="0.8"/>
    <ellipse cx="680" cy="135" rx="20" ry="15" fill="none" stroke="#ffd700" stroke-width="2"/>

    <!-- Taillight -->
    <ellipse cx="120" cy="135" rx="12" ry="8" fill="#ff0000" opacity="0.8"/>

    <!-- Side Mirror -->
    <rect x="320" y="105" width="15" height="8" fill="#808080" rx="2"/>

    <!-- Door Line -->
    <line x1="350" y1="120" x2="350" y2="190" stroke="#404040" stroke-width="2"/>

    <!-- Spoiler -->
    <path d="M 80 140 L 90 120 L 110 120 L 110 140 Z" fill="#3a3a3a" stroke="#808080" stroke-width="2"/>

    <!-- Air Intake -->
    <rect x="600" y="150" width="40" height="20" fill="#0a0a0a" stroke="#404040" stroke-width="1"/>
  </g>

  <!-- Gradient for car body -->
  <defs>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d0d0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0a0a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Light Beams from headlight -->
  <g opacity="0.3">
    <path d="M 880 335 L 1100 280 L 1100 390 Z" fill="url(#lightGradient)"/>
  </g>

  <defs>
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Ground Reflection -->
  <ellipse cx="600" cy="550" rx="400" ry="30" fill="#0a0a0a" opacity="0.3"/>

  <!-- Text -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="24" font-weight="bold"
        fill="#c0c0c0" text-anchor="middle" letter-spacing="3">
    ELITE AUTO LAB
  </text>
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="14" font-weight="600"
        fill="#808080" text-anchor="middle" letter-spacing="2">
    PRECISION ENGINEERING
  </text>
</svg>
