<!DOCTYPE html>
<html>
<head>
  <title>Simple Hummer Test</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: Arial; }
    #status { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; z-index: 1000; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const status = document.getElementById('status');
    status.innerHTML = 'Initializing Three.js...';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.AmbientLight(0xffffff, 1);
    scene.add(light);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    status.innerHTML = 'Loading Hummer H3...';

    const loader = new GLTFLoader();
    loader.load(
      '/hummer-h3.glb',
      (gltf) => {
        status.innerHTML = '✅ Hummer loaded! Rendering...';
        const model = gltf.scene;

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        model.position.sub(center);
        const maxDim = Math.max(size.x, size.y, size.z);
        model.scale.setScalar(2.5 / maxDim);

        scene.add(model);

        function animate() {
          requestAnimationFrame(animate);
          model.rotation.y += 0.01;
          renderer.render(scene, camera);
        }
        animate();
      },
      (progress) => {
        const percent = (progress.loaded / progress.total * 100).toFixed(0);
        status.innerHTML = `Loading: ${percent}%`;
      },
      (error) => {
        status.innerHTML = '❌ Error: ' + error.message;
        console.error(error);
      }
    );
  </script>
</body>
</html>
