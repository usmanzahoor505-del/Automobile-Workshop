<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Hummer H3 Model</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 5px;
      z-index: 1000;
    }
    #canvas-container {
      width: 100%;
      height: 600px;
      background: #1a1a1a;
      border: 2px solid #333;
      margin-top: 20px;
    }
    canvas {
      width: 100%;
      height: 100%;
    }
    .status {
      margin: 5px 0;
      padding: 5px;
      background: #222;
      border-radius: 3px;
    }
    .success { color: #0f0; }
    .error { color: #f00; }
    .loading { color: #ff0; }
  </style>
</head>
<body>
  <h1>🚙 Hummer H3 Model Test</h1>

  <div id="info">
    <div class="status loading" id="file-check">Checking file...</div>
    <div class="status" id="model-load">Model: Not loaded</div>
    <div class="status" id="render-status">Render: Waiting</div>
  </div>

  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const fileCheck = document.getElementById('file-check');
    const modelLoad = document.getElementById('model-load');
    const renderStatus = document.getElementById('render-status');

    // Check if file exists
    fetch('/hummer-h3.glb', { method: 'HEAD' })
      .then(response => {
        if (response.ok) {
          const size = (response.headers.get('content-length') / 1024 / 1024).toFixed(2);
          fileCheck.innerHTML = `✅ File found: ${size}MB`;
          fileCheck.className = 'status success';
          loadModel();
        } else {
          fileCheck.innerHTML = '❌ File not found (404)';
          fileCheck.className = 'status error';
        }
      })
      .catch(err => {
        fileCheck.innerHTML = '❌ Error: ' + err.message;
        fileCheck.className = 'status error';
      });

    function loadModel() {
      // Scene setup
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, 800/600, 0.1, 1000);
      camera.position.set(0, 0, 6);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(800, 600);
      renderer.setClearColor(0x1a1a1a);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
      directionalLight2.position.set(-5, 5, 5);
      scene.add(directionalLight2);

      // Load model
      const loader = new GLTFLoader();
      modelLoad.innerHTML = '⏳ Loading Hummer H3...';
      modelLoad.className = 'status loading';

      loader.load(
        '/hummer-h3.glb',
        (gltf) => {
          modelLoad.innerHTML = '✅ Hummer H3 loaded successfully!';
          modelLoad.className = 'status success';

          const model = gltf.scene;

          // Center and scale
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());

          model.position.x = -center.x;
          model.position.y = -center.y;
          model.position.z = -center.z;

          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 3.5 / maxDim;
          model.scale.setScalar(scale);

          // Rotate to face forward
          model.rotation.y = Math.PI / 2;

          scene.add(model);

          renderStatus.innerHTML = '✅ Rendering...';
          renderStatus.className = 'status success';

          // Animation loop
          function animate() {
            requestAnimationFrame(animate);
            model.rotation.y += 0.005;
            renderer.render(scene, camera);
          }
          animate();
        },
        (progress) => {
          const percent = ((progress.loaded / progress.total) * 100).toFixed(0);
          modelLoad.innerHTML = `⏳ Loading: ${percent}%`;
        },
        (error) => {
          modelLoad.innerHTML = '❌ Error loading: ' + error.message;
          modelLoad.className = 'status error';
          console.error('Load error:', error);
        }
      );
    }
  </script>
</body>
</html>
